name: Windows Client

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check PowerShell syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile("$PWD\build.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) { $errors | Format-List *; exit 1 }

      - name: Build single exe
        shell: powershell
        run: |
          .\build.ps1

      - name: Check exe
        shell: powershell
        run: |
          $exe = "$PWD\dist\TimeLingo.exe"
          $legacyExe = "$PWD\dist\ClaudeBridgeCN.exe"
          $veryLegacyExe = "$PWD\dist\BeijingClaudeTranslator.exe"
          if (-not (Test-Path $exe)) { throw "Missing exe." }
          Copy-Item $exe $legacyExe -Force
          Copy-Item $exe $veryLegacyExe -Force
          & $exe --smoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon($exe)
          if ($null -eq $icon) { throw "Missing exe icon." }
          $icon.Dispose()

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: TimeLingo
          path: |
            dist/TimeLingo.exe
            dist/ClaudeBridgeCN.exe
            dist/BeijingClaudeTranslator.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/TimeLingo.exe
            dist/ClaudeBridgeCN.exe
            dist/BeijingClaudeTranslator.exe
