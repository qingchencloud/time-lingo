name: Windows Client

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PowerShell syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile("$PWD\RedFrameClockTranslator.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List *
            exit 1
          }

      - name: Smoke test worker mode
        shell: powershell
        run: |
          $dir = Join-Path $env:RUNNER_TEMP "translator-smoke"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $input = Join-Path $dir "input.txt"
          $output = Join-Path $dir "output.json"
          [System.IO.File]::WriteAllText($input, "cd D:\Test`r`ngit status --short", [System.Text.UTF8Encoding]::new($false))
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\RedFrameClockTranslator.ps1 -WorkerMode -InputFile $input -OutputFile $output -WorkerDirection 自动判断
          if (-not (Test-Path $output)) {
            throw "Worker did not write output."
          }
          $result = Get-Content -Raw $output | ConvertFrom-Json
          if (-not $result.ok) {
            throw $result.error
          }

      - name: Package portable client
        shell: powershell
        run: |
          $app = "BeijingClaudeTranslator-win"
          $out = Join-Path $PWD "dist\$app"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item RedFrameClockTranslator.ps1,Start-ClockTranslator.vbs,Start-ClockTranslator.cmd,Install-DesktopShortcut.cmd,beijing-translator.ico,README.md,LICENSE -Destination $out
          Compress-Archive -Path "$out\*" -DestinationPath "dist\$app.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeijingClaudeTranslator-win
          path: dist/BeijingClaudeTranslator-win.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BeijingClaudeTranslator-win.zip
